<footer class="site-footer">

  <div class="footer-wrap">

    <!-- Footer Text -->
    <div class="footer-tagline">
      <p>{{ site.data.settings.footer }}</p>
    </div>

    <!-- Social Media -->
    <nav
      class="social-media"
      aria-label="Social media links"
    >

      {% for item in site.data.settings.social %}

        <a
          href="{{ item.link }}"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="{{ item.name }}"
          class="social-link"
        >

          {% if item.type == "brand" %}
            <i
              class="fa-brands fa-{{ item.icon }}"
              aria-hidden="true"
            ></i>
          {% else %}
            <i
              class="fa-solid fa-{{ item.icon }}"
              aria-hidden="true"
            ></i>
          {% endif %}

        </a>

      {% endfor %}

    </nav>

  </div>

</footer>
