<header class="site-header">

  <div class="header-wrap">

    <!-- Logo / Site Title -->
    <div class="logo">
      <a href="{{ '/' | relative_url }}">
        {{ site.data.settings.title }}
      </a>
    </div>

    <!-- Navigation -->
    <nav class="site-nav" aria-label="Main navigation">

      {% for item in site.data.settings.menu %}

        <a
          href="{{ item.url | relative_url }}"
          class="nav-link"
        >
          {{ item.name }}
        </a>

      {% endfor %}

    </nav>

  </div>

</header>
