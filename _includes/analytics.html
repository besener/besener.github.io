{% if site.data.settings.google-analytics-id %}
<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.data.settings.google-analytics-id }}"></script>

<script>
  window.dataLayer = window.dataLayer || [];

  function gtag() {
    dataLayer.push(arguments);
  }
  
  gtag('js', new Date());

  gtag('config', '{{ site.data.settings.google-analytics-id }}', {
    anonymize_ip: true,
    page_path: window.location.pathname
  });
</script>
{% endif %}
