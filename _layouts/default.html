<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.data.settings.seo.description }}">

  <title>
    {% if page.title == "Home" %}
      {{ site.data.settings.title }}
    {% else %}
      {{ page.title }} | {{ site.data.settings.title }}
    {% endif %}
  </title>

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/all.css' | relative_url }}">

  <!-- Font Awesome 6 -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  >

  {% include analytics.html %}

</head>

<body>

  <div class="site-container">

    {% include header.html %}

    <main>
      {{ content }}
    </main>

    {% include footer.html %}

  </div>

  <!-- Scripts -->
  <script src="{{ '/assets/js/functions.js' | relative_url }}"></script>

</body>
</html>
